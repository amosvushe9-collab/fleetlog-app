name: Keep Supabase Alive

on:
  schedule:
    # Runs every 4 days at 09:00 UTC — well within the 7-day pause window
    - cron: "0 9 */4 * *"
  workflow_dispatch: {}  # lets you trigger it manually from GitHub too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent auto-pause
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/cars?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
